version: 2

models:
  - name: int_portfolio_exposure
    description: >
      Portfolio positions enriched with market values and portfolio weights.
      Each row is a holding with its weight relative to the total portfolio value.
    config:
      contract:
        enforced: true
      materialized: table
    columns:
      - name: portfolio_id
        description: "Portfolio identifier"
        data_type: varchar
      - name: security_id
        description: "Security identifier"
        data_type: varchar
      - name: quantity
        description: "Number of shares/units held"
        data_type: double
      - name: price
        description: "Market price per share/unit"
        data_type: double
      - name: currency
        description: "Price currency (ISO 4217)"
        data_type: varchar
      - name: market_value
        description: "Position market value (quantity * price)"
        data_type: double
      - name: portfolio_weight
        description: "Holding weight = market_value / total portfolio market value"
        data_type: double
      - name: as_of_date
        description: "Snapshot date"
        data_type: date

  - name: int_portfolio_carbon
    description: >
      Portfolio exposure combined with carbon intensity data.
      Each row is a holding with its portfolio weight and carbon intensity.
    config:
      contract:
        enforced: true
      materialized: table
    columns:
      - name: portfolio_id
        description: "Portfolio identifier"
        data_type: varchar
      - name: security_id
        description: "Security identifier"
        data_type: varchar
      - name: quantity
        description: "Number of shares/units held"
        data_type: double
      - name: price
        description: "Market price per share/unit"
        data_type: double
      - name: market_value
        description: "Position market value"
        data_type: double
      - name: portfolio_weight
        description: "Holding weight in portfolio"
        data_type: double
      - name: company_name
        description: "Company name"
        data_type: varchar
      - name: carbon_emissions_tonnes
        description: "Carbon emissions in metric tonnes"
        data_type: double
      - name: revenue_usd
        description: "Revenue in USD"
        data_type: double
      - name: carbon_intensity
        description: "Carbon intensity of the underlying security"
        data_type: double
      - name: weighted_carbon_intensity
        description: "portfolio_weight * carbon_intensity"
        data_type: double
      - name: as_of_date
        description: "Snapshot date"
        data_type: date
