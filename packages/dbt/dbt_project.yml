name: test_app
version: "0.1.0"
config-version: 2

profile: test_app

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  reporting_date: "{{ env_var('REPORTING_DATE', '') }}"

models:
  test_app:
    staging:
      +materialized: view
      +schema: staging
    waci:
      +materialized: table
      +schema: waci
    wagr:
      +materialized: table
      +schema: wagr
