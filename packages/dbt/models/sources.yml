version: 2

sources:
  - name: upstream
    description: "Upstream data sources in parquet format"
    tables:
      - name: public_positions
        description: "Public market portfolio holdings"
        columns:
          - name: portfolio_id
          - name: isin
          - name: quantity
          - name: as_of_date

      - name: private_positions
        description: "Private market portfolio holdings"
        columns:
          - name: portfolio_id
          - name: fund_id
          - name: units_held
          - name: as_of_date

      - name: public_market_data
        description: "Public market prices"
        columns:
          - name: isin
          - name: price
          - name: currency
          - name: as_of_date

      - name: private_valuations
        description: "Private market NAV valuations"
        columns:
          - name: fund_id
          - name: nav_per_unit
          - name: valuation_method
          - name: as_of_date

      - name: security_master
        description: "Security identifier mapping and classification"
        columns:
          - name: internal_id
          - name: isin
          - name: fund_id
          - name: security_type
          - name: sector
          - name: entity_id

      - name: entity_carbon
        description: "Company-level carbon emissions data"
        columns:
          - name: entity_id
          - name: entity_name
          - name: carbon_emissions_tonnes
          - name: revenue_usd
          - name: as_of_date

      - name: entity_hierarchy
        description: "Subsidiary to parent entity mapping"
        columns:
          - name: child_entity_id
          - name: parent_entity_id

      - name: sector_carbon
        description: "Sector average carbon intensities (fallback)"
        columns:
          - name: sector
          - name: avg_carbon_intensity
          - name: as_of_date

      - name: entity_green_revenue
        description: "Company-level green revenue data"
        columns:
          - name: entity_id
          - name: entity_name
          - name: green_revenue_usd
          - name: total_revenue_usd
          - name: as_of_date

      - name: sector_green_revenue
        description: "Sector average green revenue shares (fallback)"
        columns:
          - name: sector
          - name: avg_green_revenue_share
          - name: as_of_date
