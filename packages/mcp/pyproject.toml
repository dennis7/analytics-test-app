[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "analytics-mcp"
version = "0.1.0"
description = "MCP server for conversational exploration of analytics pipeline data"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0",
    "duckdb>=1.0",
]

[project.scripts]
analytics-mcp = "server:main"

[tool.hatch.build.targets.wheel.force-include]
"server.py" = "server.py"
